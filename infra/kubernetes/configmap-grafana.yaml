apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
  namespace: rl-platform
data:
  datasource.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        jsonData:
          timeInterval: 15s
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: rl-platform
        type: file
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards
          folder: RL Platform
  rl-platform.json: |
    {
      "uid": "rl-platform",
      "title": "RL Hedging Platform",
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "panels": [
        {
          "type": "timeseries",
          "title": "API Up",
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "up{job=\"api\"}",
              "refId": "A"
            }
          ],
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 0
          }
        },
        {
          "type": "timeseries",
          "title": "API CPU Seconds",
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "rate(process_cpu_seconds_total{job=\"api\"}[5m])",
              "refId": "A"
            }
          ],
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 0
          }
        },
        {
          "type": "timeseries",
          "title": "API Memory",
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "process_resident_memory_bytes{job=\"api\"}",
              "refId": "A"
            }
          ],
          "gridPos": {
            "h": 8,
            "w": 24,
            "x": 0,
            "y": 8
          }
        }
      ]
    }
