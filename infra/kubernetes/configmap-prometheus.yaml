apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: rl-platform
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    rule_files:
      - /etc/prometheus/alert_rules.yml
    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets:
              - prometheus:9090
      - job_name: api
        metrics_path: /metrics
        static_configs:
          - targets:
              - api:8000
  alert_rules.yml: |
    groups:
      - name: service_alerts
        rules:
          - alert: ServiceDown
            expr: up == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: Service {{ $labels.instance }} down
              description: Target {{ $labels.instance }} in job {{ $labels.job }} has been down for more than 1 minute
