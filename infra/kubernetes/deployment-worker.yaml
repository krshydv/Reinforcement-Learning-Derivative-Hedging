apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: rl-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: rl-derivative-hedging-api:prod
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - /app/scripts/worker.sh
          envFrom:
            - configMapRef:
                name: rl-platform-config
            - secretRef:
                name: rl-platform-secrets
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "python -c 'import redis,os,sys;import urllib.parse as u;url=u.urlparse(os.environ.get("REDIS_URL",""));client=redis.Redis(host=url.hostname,port=url.port,db=int((url.path or "/0").lstrip("/")));client.ping();sys.exit(0)'"
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "python -c 'import redis,os,sys;import urllib.parse as u;url=u.urlparse(os.environ.get("REDIS_URL",""));client=redis.Redis(host=url.hostname,port=url.port,db=int((url.path or "/0").lstrip("/")));client.ping();sys.exit(0)'"
            initialDelaySeconds: 10
            periodSeconds: 10
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - sleep 10
      terminationGracePeriodSeconds: 30
