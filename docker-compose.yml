version: "3.9"
services:
  api:
    build:
      context: ./backend
    env_file:
      - .env.example
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    ports:
      - "8000:8000"
      - "8001:8001"
    command: ["/app/scripts/start.sh"]
    healthcheck:
      test: ["CMD","python","-c","import urllib.request,sys;urllib.request.urlopen('http://localhost:8000/health');sys.exit(0)"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
  worker:
    build:
      context: ./backend
    env_file:
      - .env.example
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    command: ["/app/scripts/worker.sh"]
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: rl_hedging
      POSTGRES_USER: rl_user
      POSTGRES_PASSWORD: rl_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U rl_user -d rl_hedging"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
    ports:
      - "5000:5000"
    command: ["mlflow","server","--host","0.0.0.0","--port","5000","--backend-store-uri","sqlite:///mlflow.db","--default-artifact-root","/mlruns"]
    healthcheck:
      test: ["CMD","python","-c","import urllib.request,sys;urllib.request.urlopen('http://localhost:5000');sys.exit(0)"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./infra/monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD-SHELL","wget -qO- http://localhost:9090/-/healthy > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL","wget -qO- http://localhost:3000/api/health > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
        NEXT_PUBLIC_WS_URL: ws://localhost:8080
    env_file:
      - .env.example
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD","node","-e","fetch('http://localhost:3000/').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
volumes:
  postgres_data:
  grafana_data:
